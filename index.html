<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recarga Fácil MTU — Baixar App</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap');

    :root {
      --green: #1D9E75;
      --green-dark: #0F6E56;
      --green-light: #E1F5EE;
      --green-mid: #9FE1CB;
      --text: #1a1a1a;
      --muted: #5a5a5a;
      --bg: #f7faf9;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 2.5rem 2rem;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
      text-align: center;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
    }

    .logo-wrap svg {
      width: 44px;
      height: 44px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 1rem 1.25rem;
      border-radius: 14px;
      text-decoration: none;
      font-family: 'Sora', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.875rem;
      transition: transform 0.15s, box-shadow 0.15s;
      border: none;
      cursor: pointer;
    }

    .btn:last-child { margin-bottom: 0; }

    .btn:active { transform: scale(0.98); }

    .btn-android {
      background: var(--green);
      color: #fff;
    }

    .btn-android:hover { background: var(--green-dark); box-shadow: 0 4px 16px rgba(29,158,117,0.35); }

    .btn-ios {
      background: #1a1a1a;
      color: #fff;
    }

    .btn-ios:hover { background: #333; box-shadow: 0 4px 16px rgba(0,0,0,0.2); }

    .btn-icon {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-text { text-align: left; }
    .btn-label { font-size: 0.72rem; font-weight: 400; opacity: 0.8; display: block; }
    .btn-name { font-size: 1rem; font-weight: 700; display: block; }

    .divider {
      font-size: 0.75rem;
      color: var(--muted);
      margin: 1.5rem 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e0e0e0;
    }

    .redirect-note {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 1.5rem;
    }

    #auto-msg {
      display: none;
      background: var(--green-light);
      color: var(--green-dark);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.82rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
